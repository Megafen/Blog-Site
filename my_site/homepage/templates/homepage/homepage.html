{% extends 'base.html' %}
{% block content %}
    <h1 class="mb-4">Последние статьи</h1>
    {% if posts %}
        <div class="row">
            {% for post in posts %}
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">
                                <a href="{% url 'post_detail' post.id %}" class="text-decoration-none">
                                    {{ post.title }}
                                </a>
                            </h5>
                            <p class="card-text">{{ post.content|truncatechars:200 }}</p>
                            <p class="text-muted small">Опубликовано: {{ post.published_date|date:"d E Y H:i" }}</p>
                            <!-- Если позже сделаете страницу отдельной статьи, здесь будет ссылка -->
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>Пока нет статей.</p>
    {% endif %}
{% endblock %}
